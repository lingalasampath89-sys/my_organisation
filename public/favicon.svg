<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Red network star design inspired by AISI logo -->
  <defs>
    <style>
      .aisi-node { fill: #DC2626; }
      .aisi-line { stroke: #DC2626; stroke-width: 2.5; }
    </style>
  </defs>
  
  <!-- Center -->
  <circle cx="60" cy="60" r="6" class="aisi-node"/>
  
  <!-- Outer nodes (8 points like a star) -->
  <circle cx="60" cy="20" r="5" class="aisi-node"/>
  <circle cx="85" cy="30" r="5" class="aisi-node"/>
  <circle cx="100" cy="60" r="5" class="aisi-node"/>
  <circle cx="85" cy="90" r="5" class="aisi-node"/>
  <circle cx="60" cy="100" r="5" class="aisi-node"/>
  <circle cx="35" cy="90" r="5" class="aisi-node"/>
  <circle cx="20" cy="60" r="5" class="aisi-node"/>
  <circle cx="35" cy="30" r="5" class="aisi-node"/>
  
  <!-- Inner nodes (4 diagonal points) -->
  <circle cx="75" cy="50" r="4" class="aisi-node"/>
  <circle cx="75" cy="70" r="4" class="aisi-node"/>
  <circle cx="45" cy="70" r="4" class="aisi-node"/>
  <circle cx="45" cy="50" r="4" class="aisi-node"/>
  
  <!-- Lines connecting nodes -->
  <!-- Center to outer -->
  <line x1="60" y1="60" x2="60" y2="20" class="aisi-line"/>
  <line x1="60" y1="60" x2="85" y2="30" class="aisi-line"/>
  <line x1="60" y1="60" x2="100" y2="60" class="aisi-line"/>
  <line x1="60" y1="60" x2="85" y2="90" class="aisi-line"/>
  <line x1="60" y1="60" x2="60" y2="100" class="aisi-line"/>
  <line x1="60" y1="60" x2="35" y2="90" class="aisi-line"/>
  <line x1="60" y1="60" x2="20" y2="60" class="aisi-line"/>
  <line x1="60" y1="60" x2="35" y2="30" class="aisi-line"/>
  
  <!-- Center to inner -->
  <line x1="60" y1="60" x2="75" y2="50" class="aisi-line"/>
  <line x1="60" y1="60" x2="75" y2="70" class="aisi-line"/>
  <line x1="60" y1="60" x2="45" y2="70" class="aisi-line"/>
  <line x1="60" y1="60" x2="45" y2="50" class="aisi-line"/>
  
  <!-- Outer nodes connections -->
  <line x1="60" y1="20" x2="85" y2="30" class="aisi-line"/>
  <line x1="85" y2="30" x2="100" y2="60" class="aisi-line"/>
  <line x1="100" y1="60" x2="85" y2="90" class="aisi-line"/>
  <line x1="85" y1="90" x2="60" y2="100" class="aisi-line"/>
  <line x1="60" y1="100" x2="35" y2="90" class="aisi-line"/>
  <line x1="35" y1="90" x2="20" y2="60" class="aisi-line"/>
  <line x1="20" y1="60" x2="35" y2="30" class="aisi-line"/>
  <line x1="35" y1="30" x2="60" y2="20" class="aisi-line"/>
</svg>